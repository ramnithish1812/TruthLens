# ─────────────────────────────────────────────────────────────────────────────
# configs/train_config.yaml
# Default hyperparameters for DeBERTa-v3 RAG Hallucination Detector
# ─────────────────────────────────────────────────────────────────────────────

model:
  name: "microsoft/deberta-v3-base"
  num_labels: 2
  torch_dtype: "float32"       # float32 recommended for DeBERTa stability

data:
  response_path: "./RAGTruth-main/dataset/response.jsonl"
  max_length: 256
  test_size: 0.20
  seed: 42

training:
  output_dir: "./Hallucination_Model"
  epochs: 5
  learning_rate: 2.0e-5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  weight_decay: 0.01
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 100
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  fp16: false
  bf16: false
  report_to: "none"

inference:
  batch_size: 32
  threshold: 0.5              # P(hallucinated) >= threshold → positive
